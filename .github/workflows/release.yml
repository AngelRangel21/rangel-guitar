name: Release

on:
  push:
    branches: ['master']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Importante: semantic-release necesita todo el historial para calcular la versión

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          version: latest # O la versión que estés usando localmente

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Release
        run: bunx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Si planeas publicar en NPM, necesitarías añadir también:
          # NPM_TOKEN: ${{ secrets.NPM_TOKEN }}